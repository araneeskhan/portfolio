<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project-details.css">
    <link rel="stylesheet" href="mediaqueries.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Desktop Nav -->
    <nav id="desktop-nav">
        <div class="logo">Anees Ur Rehman</div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#experience">Skills</a></li>
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="index.html#achievements">Achievements</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li>
                    <i class="fas fa-moon theme-toggle icon" onclick="toggleTheme()"></i>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hamburger Nav -->
    <nav id="hamburger-nav">
        <div class="logo">Anees ur Rehman</div>
        <div class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-links">
                <li style="--i:0"><a href="index.html#about" onclick="toggleMenu()">About</a></li>
                <li style="--i:1"><a href="index.html#experience" onclick="toggleMenu()">Skills</a></li>
                <li style="--i:2"><a href="index.html#projects" onclick="toggleMenu()">Projects</a></li>
                <li style="--i:3"><a href="index.html#achievements" onclick="toggleMenu()">Achievements</a></li>
                <li style="--i:4"><a href="index.html#contact" onclick="toggleMenu()">Contact</a></li>
                <li style="--i:5">
                    <i class="fas fa-moon theme-toggle icon" onclick="toggleTheme()"></i>
                </li>
            </div>
        </div>
    </nav>

    <div class="project-details-container">
        <div class="project-content">
            <h1 class="project-title" id="projectTitle">Project Title</h1>
            
            <div class="project-cover">
                <img id="coverImage" src="" alt="Project Cover Image">
            </div>

            <div class="project-info">
                <div class="project-description">
                    <h2>About Project</h2>
                    <p id="projectDescription"></p>
                </div>

                <div class="project-tech">
                    <h2>Technologies Used</h2>
                    <div class="tech-stack" id="techStack">
                        <!-- Tech stack will be loaded dynamically -->
                    </div>
                </div>

                <div class="project-features">
                    <h2>Key Features</h2>
                    <ul id="featuresList">
                        <!-- Features will be loaded dynamically -->
                    </ul>
                </div>

                <div class="project-demo">
                    <h2>Demo Video</h2>
                    <div class="video-container" id="videoContainer">
                        <!-- Video will be loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="project-details.js"></script>
</body>
</html>
